      /*--------------------------------------------------------------
      # Navigation Menu
      --------------------------------------------------------------*/
      /* Desktop Navigation */
      .nav-menu ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      /* .nav-menu > ul {
        display: flex;
      } */

      .nav-menu > ul > li {
        position: relative;
        white-space: nowrap;
        padding: 10px 0 10px 24px;
      }

      .nav-menu a {
        display: block;
        position: relative;
        color: rgba(255, 255, 255, 0.7);
        transition: 0.3s;
        font-size: 15px;
        font-weight: 600;
        padding: 0 3px;
        font-family: "Open Sans", sans-serif;
      }

      .nav-menu > ul > li > a:before {
        content: "";
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: -5px;
        left: 0;
        background-color: #fff;
        visibility: hidden;
        width: 0px;
        transition: all 0.3s ease-in-out 0s;
      }

      .nav-menu a:hover:before, .nav-menu li:hover > a:before, .nav-menu .active > a:before {
        visibility: visible;
        width: 100%;
      }

      .nav-menu a:hover, .nav-menu .active > a, .nav-menu li:hover > a {
        color: #fff;
      }

      .nav-menu .drop-down ul {
        display: block;
        position: absolute;
        left: 22px;
        top: calc(100% + 30px);
        z-index: 99;
        opacity: 0;
        visibility: hidden;
        padding: 10px 0;
        background: #fff;
        box-shadow: 0px 0px 30px rgba(127, 137, 161, 0.25);
        transition: 0.3s;
      }

      .nav-menu .drop-down:hover > ul {
        opacity: 1;
        top: 100%;
        visibility: visible;
      }

      .nav-menu .drop-down li {
        min-width: 180px;
        position: relative;
      }

      .nav-menu .drop-down ul a {
        padding: 10px 20px;
        font-size: 14px;
        text-transform: none;
        color: #2c4964;
      }

      .nav-menu .drop-down ul a:hover, .nav-menu .drop-down ul .active > a, .nav-menu .drop-down ul li:hover > a {
        color: #5846f9;
      }

      .nav-menu .drop-down > a:after {
        content: "\ea99";
        font-family: IcoFont;
        padding-left: 5px;
      }

      .nav-menu .drop-down .drop-down ul {
        top: 0;
        left: calc(100% - 30px);
      }

      .nav-menu .drop-down .drop-down:hover > ul {
        opacity: 1;
        top: 0;
        left: 100%;
      }

      .nav-menu .drop-down .drop-down > a {
        padding-right: 35px;
      }

      .nav-menu .drop-down .drop-down > a:after {
        content: "\eaa0";
        font-family: IcoFont;
        position: absolute;
        right: 15px;
      }

      @media (max-width: 1366px) {
        .nav-menu .drop-down .drop-down ul {
          left: -90%;
        }
        .nav-menu .drop-down .drop-down:hover > ul {
          left: -100%;
        }
        .nav-menu .drop-down .drop-down > a:after {
          content: "\ea9d";
        }

      .mobile-nav {
        position: fixed;
        top: 55px;
        right: 15px;
        bottom: 15px;
        left: 15px;
        z-index: 9999;
        overflow-y: auto;
        background: #fff;
        transition: ease-in-out 0.2s;
        opacity: 0;
        visibility: hidden;
        border-radius: 10px;
        padding: 10px 0;
      }

      .mobile-nav * {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .mobile-nav a {
        display: block;
        position: relative;
        color: #2c4964;
        padding: 10px 20px;
        font-weight: 500;
        outline: none;
      }

      .mobile-nav a:hover, .mobile-nav .active > a, .mobile-nav li:hover > a {
        color: #5846f9;
        text-decoration: none;
      }

      .mobile-nav .drop-down > a:after {
        content: "\ea99";
        font-family: IcoFont;
        padding-left: 10px;
        position: absolute;
        right: 15px;
      }

      .mobile-nav .active.drop-down > a:after {
        content: "\eaa1";
      }

      .mobile-nav .drop-down > a {
        padding-right: 35px;
      }

      .mobile-nav .drop-down ul {
        display: none;
        overflow: hidden;
      }

      .mobile-nav .drop-down li {
        padding-left: 20px;
      }

      .mobile-nav-overly {
        width: 100%;
        height: 100%;
        z-index: 9997;
        top: 0;
        left: 0;
        position: fixed;
        background: rgba(28, 47, 65, 0.6);
        overflow: hidden;
        display: none;
        transition: ease-in-out 0.2s;
      }

      .mobile-nav-active {
        overflow: hidden;
      }

      .mobile-nav-active .mobile-nav {
        opacity: 1;
        visibility: visible;
      }

      .mobile-nav-active .mobile-nav-toggle i {
        color: #fff;
      }

  <script>
    var socket = io();
    let currentSelectedWorkCategory = "Education";
    let localStorage = {};
    let application = "gini_home";
    function inittial_setup(sections, edit){
        console.log("################## calling cli ent side init function ===============");
        console.log("################## sections :: ", sections);
        let dynamicHeaderMenus = [];
        let sectionsTemplate = '';
        sections.values.forEach((item, index) => {
            dynamicHeaderMenus.push(item.section.name);
        });
        sections.values.forEach((item, index) => {
            let loaderTemplate = '';
            let request_section_data = {apiRef : item.section.name+'_section', sectionName: item.section.name+'_section', blockId: 'custom_'+item.section.name+'_block', templateId: 'custom_'+item.section.name+'_template', loaderId: 'custom_'+item.section.name+'_loader', edit: edit, myPortfolio: true, application: application};

            if(item.loader.img !== undefined && item.loader.img !== null){
                loaderTemplate += `<img class="loader-img" src="`+item.loader.img.imgUrl+`"  alt="`+item.loader.alt+`" style="`+item.loader.img.style+`">`;
            }
            if(item.section.name === 'work'){
                  request_section_data.logoCategory = "Education";
            }

            if(item.section.name === 'typed' || item.section.name === 'settings'){
                // request_section_data = {apiRef : item.section.name+'_section', blockId: null, templateId: null, loaderId: null, edit: edit}
                // socket.emit("request-generic-portfolio", request_section_data);

            }else if(item.section.name === 'header'){
              sectionsTemplate += `
                      <div class="custom-`+item.section.name+`-block " id="custom_`+item.section.name+`_block" style="`+item.block.style+`">
                          <div class="loader-block" id="custom_`+item.section.name+`_loader" style="display: block; `+item.loader.style+`">
                              `+loaderTemplate+`
                          </div>
                          <div class="custom-`+item.section.name+`-template `+item.template.class+`" id="custom_`+item.section.name+`_template" style="display: none; `+item.template.style+`"></div>
                      </div>
              `;
              request_section_data.dynamic_header_menus = dynamicHeaderMenus;
              request_section_data.dynamic_sections = sections;
              socket.emit("request-generic-portfolio", request_section_data);
            }else if(item.section.name === 'headerNav'){
                    request_section_data = {apiRef : item.section.name+'_section', sectionName: item.section.name+'_section', blockId: null, templateId: 'mobileSideNavBar', loaderId: null, edit: edit, application: application};
                    socket.emit("request-generic-portfolio", request_section_data);
            }else if(item.section.name === 'mobileSideNavBar'){
                    request_section_data = {apiRef : item.section.name+'_section', sectionName: item.section.name+'_section', blockId: null, templateId: 'mobileSideNavBar', loaderId: null, edit: edit, application: application};
                    socket.emit("request-generic-portfolio", request_section_data);
            }else if(item.section.name !== 'header'){
              sectionsTemplate += `
                  <section id="`+item.section.name+`" class="`+item.section.name+`" style="`+item.section.style+`">
                      <div class="custom-`+item.section.name+`-block " id="custom_`+item.section.name+`_block" style="`+item.block.style+`">
                          <div class="loader-block" id="custom_`+item.section.name+`_loader" style="display: block; `+item.loader.style+`">
                                `+loaderTemplate+`
                          </div>
                          <div class="custom-`+item.section.name+`-template `+item.template.class+`" id="custom_`+item.section.name+`_template" style="display: none; `+item.template.style+`"></div>
                      </div>
                  </section>
              `;
              socket.emit("request-generic-portfolio", request_section_data);

            }

        })
        // console.log("@@@ sectionsTemplate : ", sectionsTemplate);
        {
          document.getElementById("sections_block").innerHTML = '';
          document.getElementById("sections_block").innerHTML = sectionsTemplate;
          // if(sections.sectionStyle && sections.sectionStyle !== ''){
          //   document.getElementById("sections_block").style = sections.sectionStyle;
          // }
        }

    };

    })();

    socket.on("response-gini-home-initial-sections", (data) => {
          console.log("!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!");
          console.log("!!! initSections :: ", data.initSections);
          setup_default_theme(data.defaultStyle);
          inittial_setup(data.initSections, false);
    })

    function createTypedSection(data){
        // console.log("@@@ data :: ", data);
        // console.log("url: ", data.data.img.url);
        let typedTxt = data.data.typedText;
        let typedOptions = data.data.typedOptions;
        let template = `
            <section id="hero" class="d-flex flex-column justify-content-center align-items-center">
                <h1 style="`+data.data.profile.style+`">`+data.data.profile.name+`</h1>
                <div class="element" style="font-size: 44px; color: white; font-weight: 700;"></div>
            </section>
        `;
        //document.getElementById("custom_typed_loader").style.display = "none";
        document.getElementById("typedBlock").innerHTML = template;
        // document.getElementById("hero").style.backgroundImage = "url('static/img/me_portfolio/portfolio1.jpg')";
        if(data.data.img && data.data.img.url !== ''){

    function setup_default_theme(defaultStyle){
        console.log("============ calling default style function =============");
        console.log("@@@ defaultStyle : ", defaultStyle);
        let root = document.documentElement;
        root.style.setProperty('--default-theme-color', defaultStyle.themeColor);
        root.style.setProperty('--default-theme-bg-color', defaultStyle.themeBgColor);
        root.style.setProperty('--default-theme-font-color', defaultStyle.themeFontColor);
        root.style.setProperty('--default-theme-menu-bg-color', defaultStyle.themeMenuBgColor);
        root.style.setProperty('--default-theme-menu-font-color', defaultStyle.themeMenuFontColor);
        root.style.setProperty('--default-theme-on-hover-bg-color', defaultStyle.themeMenuOnHoverBgColor);
        root.style.setProperty('--default-theme-on-hover-font-color', defaultStyle.themeMenuOnHoverFontColor);
        root.style.setProperty('--default-theme-primary-color', defaultStyle.themePrimaryColor);

    }

    socket.on("response-generic-portfolio", (data) => {
        console.log("!!! data.apiref :: ", data);
        if(data.apiRef === 'settings_section'){
          // console.log("$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$");
          // console.log("!!!!@@@@ data : ", data );
          document.getElementById("setupSectionsBlock").innerHTML = data.template;
          return;
        }
        if(data.apiRef === 'about_section'){
            // console.log("!!!! data : ", data );
        }
        if(data.apiRef === "typed_section"){
            createTypedSection(data);
            return;
        }
        if(data.apiRef === "update_initial_sections"){
          updateSettingsBlock();
          return;
        }
        if(data.apiRef === 'request_initial_sections'){
            console.log("!!! initSections :: ", data.initSections);
            setup_default_theme(data.defaultStyle);
            inittial_setup(data.initSections, false);
        }
        if(data.apiRef === 'headerNav_section'){
            // console.log("7777777777777777777777777777777777777777777777777777777777777777777");
            // console.log("@@@ data :: ", data);
            document.getElementById("header").innerHTML = data.template;
            return ;
        }
        if(data.apiRef === 'mobileSideNavBar_section'){
            document.getElementById(data.templateId).innerHTML = data.template;
            return ;
        }
        if(data.blockId !== null && data.blockId !== undefined){

        }
        if(data.loaderId !== null && data.loaderId !== undefined && data.loaderId !== ''){
            document.getElementById(data.loaderId).style.display = "none";
        }
        if(data.templateId !== null && data.templateId !== undefined && data.templateId !== ''){
          document.getElementById(data.templateId).style.display = "block";
          document.getElementById(data.templateId).innerHTML = '';
          document.getElementById(data.templateId).innerHTML = data.template;
        }

    })

    window.onClickworkCategoryArrowIcon = function(event, arrow){
        console.log("======== calling onClickworkCategoryArrowIcon function =========");
        if(arrow === "left_arrow"){
            if(workCategoryStartIndex !== 0){
                workCategoryStartIndex -= 1;
                createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
                document.getElementById("workCategory_left_arrow").style.display = "block";
                document.getElementById("workCategory_right_arrow").style.display = "block";
            }else if(workCategoryStartIndex === 0){
              document.getElementById("workCategory_left_arrow").style.display = "none";
            }else{
                document.getElementById("workCategory_left_arrow").style.display = "none";
            }
        }else if(arrow === "right_arrow"){
            if(workCategoryStartIndex <= 3){
                workCategoryStartIndex += 1;
                createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
                document.getElementById("workCategory_left_arrow").style.display = "block";
            }else{
              document.getElementById("workCategory_right_arrow").style.display = "none";
            }
        }
      }

              console.log("!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!");

              window.open("http://localhost:4000/me", "_blank", );

          }else if(state === 'setup_theme'){

              $("#setupThemeModal").modal();

          }else if(state === 'close-themeing-modal'){
            console.log("!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!");
            $('#setupThemeModal').modal('hide');

          }else if(state === 'apply_theme_changes'){
            let themeColor = document.getElementById("defaultThemeColor").value;
            let themeBgColor = document.getElementById("defaultThemeBgColor").value;
            localStorage.themeBgColor = themeBgColor;
            let themeFontColor = document.getElementById("defaultThemeFontColor").value;
            let themeMenuFontColor = document.getElementById("defaultThemeMenuFontColor").value;
            let themeMenuBgColor = document.getElementById("defaultThemeMenuBgColor").value;
            let themeMenuOnHoverFontColor = document.getElementById("themeMenuOnHoverFontColor").value;
            let themeMenuOnHoverBgColor = document.getElementById("themeMenuOnHoverBgColor").value;
            let themePrimaryColor = document.getElementById("themePrimaryColor").value;

              // console.log("@@@ themeColor : ", themeColor);
              // console.log("@@@ themeBgColor : ", themeBgColor);
              // console.log("@@@ themeFontColor : ", themeFontColor);
              // console.log("@@@ themeMenuFontColor : ", themeMenuFontColor);
              // console.log("@@@ themeMenuBgColor : ", themeMenuBgColor);
              // console.log("@@@ themeMenuOnHoverFontColor : ", themeMenuOnHoverFontColor);
              // console.log("@@@ themeMenuOnHoverBgColor : ", themeMenuOnHoverBgColor);

              let newTheme = {
                themeColor : themeColor,
                themeBgColor : themeBgColor,
                themeFontColor : themeFontColor,
                themeMenuFontColor : themeMenuFontColor,
                themeMenuBgColor : themeMenuBgColor,
                themeMenuOnHoverFontColor : themeMenuOnHoverFontColor,
                themeMenuOnHoverBgColor : themeMenuOnHoverBgColor,
                themePrimaryColor : themePrimaryColor
              };
              setup_default_theme(newTheme);
              applyNewTheme(newTheme);
              $('#setupThemeModal').modal('hide');

          }else if(state === 'apply_store_theme'){
              console.log("======= calling apply store theme  =======");
              console.log("@@@ id : ", that.id);
              let tempid = that.id.split("-");
              let theme = that.getAttribute("data");
              theme = JSON.parse(theme);
              // console.log("@@@@ data :: ", theme.themeColor);
              setup_default_theme(theme);
              applyNewTheme(theme);
              $('#setupThemeModal').modal('hide');
              let payload = {
                apiRef : 'update_block_data',
                actionType : 'apply_store_theme',
                sectionName : tempid[0].split("_")[1]+'_'+tempid[0].split("_")[2],
                sectionIndex: parseInt(tempid[1]),
                partsIndex: parseInt(tempid[2]),
                itemIndex: parseInt(tempid[3]),
                application: application
              }
              console.log("@@@ payload : ", payload);
              socket.emit("request-generic-portfolio", payload);
          }else if(state === 'custom_theme_section'){
              console.log("@@@ btn id : ", that.id);
              let tempid = that.id.split("-");
              let nextItemIndex = tempid[0]+'-'+tempid[1]+'-'+tempid[2]+'-'+(parseInt(tempid[3])+1);
              nextItemIndex = nextItemIndex.replace("element", "item")
              let currentItemid = that.id.replace("element", "item");
              // console.log("@@@ nextItemIndex : ", nextItemIndex);
              document.getElementsByClassName("custom_theme_section")[0].style.display = "block";
              document.getElementsByClassName("custom_theme_store")[0].style.display = "none";

              document.getElementById(nextItemIndex).classList.remove("custom-theme-bb-2");

                actionType : 'save_item_isselected',

                itemIndex: parseInt(tempid[3]),

              }

              // console.log("@@@ prevItemIndex : ", prevItemIndex);
              document.getElementsByClassName("custom_theme_section")[0].style.display = "none";
              document.getElementsByClassName("custom_theme_store")[0].style.display = "block";
              document.getElementById(currentItemid).classList.add("custom-theme-bb-2");
              document.getElementById(prevItemIndex).classList.remove("custom-theme-bb-2");

                itemIndex: parseInt(tempid[3]),
                application: application
              }
              console.log("@@@ payload : ", payload);
              socket.emit("request-generic-portfolio", payload);
          }
