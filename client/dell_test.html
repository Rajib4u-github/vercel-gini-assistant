<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dell UI Test</title>

    <style media="screen">

      @media (max-width: 480px) and (min-width: 320px){
        .fill{background: black; color: var(--theme-white); border: none; border: 2px solid var(--default-theme-color);}
        .header-nav{display: none;}
        .banner-img{ width: 100% !important; height: 100vh; opacity: 0.4;}
        .banner-content{width: 305px !important; position: absolute; left: 1% !important; top: 35% !important;}
        .mob-header-nav{display: block !important; padding: 15px 0px;}
        .mob-header-nav > .burger{display:inline-block; float: left; transform: rotate(90deg); margin-left: 12px; }
        .mob-header-nav > .brand{display: inline-block; margin-left: 20px; position: relative; top: -5px; font-weight: 700;}
        .mob-header-nav > .brand-name{font-weight: 700; color: var(--default-primary-font-color); font-size: 18px;}
        .mob-header-nav > .mob-header-three-dots{float: right; transform: rotate(90deg); position: relative; top: -6px; outline: none !important;}
        .mob-header-nav > .mob-header-three-dots > .three-dots-icon{font-weight: 700; color: var(--default-primary-font-color); padding: 5px; font-size: 22px;}
        .mob-side-nav{display: block; position: fixed;  top: 0;  left: 0;  bottom: 0;  width: 220px;  transition: all ease-in-out 0.5s;  z-index: 99;transition: all 0.5s;  padding: 0 0px;  background: var(--theme-off-white); overflow-y: auto;}
        .side-nav-bar{position: relative; top: 10%;}
        .side-nav-bar > ul{list-style: none; padding: 0px;}
        .side-nav-bar > ul > li{padding: 10px 15px; width: 87%; }
        .side-nav-bar > ul > .active{background: var(--default-theme-color); color: var(--theme-white) !important;}

        .side-nav-bar a {display: block;  position: relative;  transition: 0.3s;  font-size: 16px;font-family: "Open Sans", sans-serif; color: var(--default-primary-font-color);}
        .side-nav-close-btn{float: right; font-size: 30px;  color: var(--default-primary-font-color); font-weight: 700;transform: rotate(45deg); margin-top: 10px; margin-right: 16px;}

      }

      @media (min-width: 768px) {
        .nav-menu ul {  margin: 0;  padding: 0;list-style: none;}
        .nav-menu > ul {display: flex;align-items: center;}
        .nav-menu > ul > li {  position: relative; white-space: nowrap;  padding-left: 28px;}
        .nav-menu a {display: block;  position: relative;  transition: 0.3s;  font-size: 16px;font-family: "Open Sans", sans-serif;color: var(--theme-grey);}
        .nav-menu a:hover {color: var(--default-theme-color) !important;}
        .active-nav{color: var(--default-theme-color) !important;}
        .header-nav{padding: 30px 10px 30px 10px; width: 100%; background: var(--theme-off-white);}
        .header-nav > .empty-div{width: 15%; display: inline-block;}
        .header-nav > .header-nav-brand > .brand{font-weight: 700; color: var(--default-primary-font-color); font-size: 22px;}
        .header-nav > .header-nav-brand > .brand a:hover{font-weight: 700; color: var(--default-theme-color); font-size: 22px;}
        .header-nav > .header-nav-brand{width: 49%; display: inline-block;}
        .header-nav > .header-nav-navigation{width: 20%; display: inline-block;}
        .mob-side-nav{display: none;}
      }


    </style>

    <style media="screen">
      :root {
        --default-theme-color: #3B8AF7;
        --default-primary-font-color: #000;
        --theme-white: #fff;
        --theme-grey: grey;
        --theme-off-white: #F6F7F9;
      }
       body{margin-left: 0px !important; margin-top: 0px !important; margin-right: 0px !important; overflow-x: hidden;}
      .brand a{text-decoration: none; color: var(--default-primary-font-color);}
      .btn{padding: 8px 25px; border-radius: 5px; }
      .btn-fill{background: var(--default-theme-color); color: var(--theme-white); border: none; border: 2px solid var(--default-theme-color); }
      .btn-fill:hover{background: transparent; color: var(--default-primary-font-color); border: none; border: 2px solid var(--theme-grey); }
      .btn-light{background: transparent; color: var(--default-primary-font-color); border: 2px solid var(--theme-grey); margin-left: 16px; }
      .btn-light:hover{background: var(--default-theme-color); color: var(--theme-white); border: 2px solid var(--default-theme-color); margin-left: 16px; }
      .banner-content{width: 305px; position: absolute; left: 21%; top: 45%; z-index: 9; padding: 16px;}
      .banner-content > .title{font-weight: 700; color: var(--default-primary-font-color); font-size: 32px; margin-bottom: 20px;}
      .banner-content > .content{color: var(--default-primary-font-color); font-weight: 600px;}
      .banner-content > .btns{margin-top: 20px;}
      .banner-content > .btns > .btn-block{float: left; display: inline-block;}
      .banner-img{width: 100%; height: 100vh; opacity: 0.4;}
      .banner-img:hover{width: 100%; height: 100vh; opacity: 0.4; transform: scale(1.1); transition: all ease-in-out 0.4s;}
      .mob-header-nav{display: none;}
      a{text-decoration: none;}
      .services a{color: var(--default-theme-color);}
      .services a:hover{color: var(--default-primary-font-color);}
      .services > .services-link{text-align: center; margin: 40px 0px;}
      .services > .services-link > .services-title{font-size: 32px; margin: 5px 0px; font-weight: 700;}
      .burger-menu{border-left: 2px solid var(--default-primary-font-color); padding-bottom: 3px; padding-left: 5px;}

    </style>



  </head>

  <body>
  <header id="header" class="">
      <div class="header-nav" style="">
        <div class="empty-div" style="">  </div>
        <div class="header-nav-brand" style="">
          <span class="brand" tabindex="0" style=""><a href="">Company</a></span>
        </div>
        <div class="header-nav-navigation" style="">
          <nav class="nav-menu ">
            <ul>
              <li tabindex="0"><a class="active-nav" href="">About Us</a></li>
              <li tabindex="0"><a href="#about">Services</a></li>
              <li tabindex="0"><a href="#menu">Contact Us</a></li>
            </ul>
          </nav>
        </div>
        <div class="empty-div" style="">  </div>
      </div>

      <div class="mob-header-nav">
          <div class="burger" onclick="onClickMobSideNavBtn(this, event)"  style="" >
              <span class="burger-menu" style=""></span>
              <span class="burger-menu" style=""></span>
              <span class="burger-menu" style=""></span>
          </div>
          <div class="brand" style="">
              <span  class="brand-name" style="">Company</span>
          </div>
          <div class="mob-header-three-dots"  style="">
              <span class="three-dots-icon" style="">...</span>
          </div>
          <div id="mobSideNav" class="mob-side-nav" style="display: none;">
              <div class="">
                  <span class="side-nav-close-btn" onclick="onClickMobSideNavBtn(this, event)" style="">+</span>
              </div>

              <div class="side-nav-bar">
                <ul>
                  <li class="active" tabindex="0"><a href="#">About Us</a></li>
                  <li tabindex="0"><a href="#about">Services</a></li>
                  <li tabindex="0"><a href="#menu">Contact Us</a></li>
                </ul>
              </div>
          </div>
      </div>
  </header>

  <section id="brandImg" class="brand-img">
      <div class="">
          <div class="banner-content" style="">
              <div class="title" style="">
                  <span>Web developement is fun</span>
              </div>
              <div class="content" style="">
                <span>Thanks for taking this Challenge. We are exited to see how you tackle this challenge. </span>
              </div>
              <div class="btns" style="">
                  <div class="btn-block" tabindex="0" style="">
                    <button type="button" class="btn btn-fill"  name="button">Learn More</button>
                  </div>
                  <div class="btn-block" tabindex="0" style=" ">
                    <button type="button" class="btn btn-light"  name="button">Get in touch</button>
                  </div>
              </div>
          </div>
          <div style="overflow: hidden;">
            <img src="static/img/dell_test/main-banner.jpg" class="banner-img" alt="brand-img">
          </div>
      </div>
  </section>
  <section id="services" class="">
    <div class="services">
        <div class="services-link" style="">
            <div class="" tabindex="0" ><a href="#">AREAS WHAT WE SERVE</a></div>
            <div class="services-title" style="">Our Services</div>
        </div>
    </div>
  </section>

  <script type="text/javascript">

    window.onClickMobSideNavBtn = function(that, event){
        console.log("====== calling onClickMobSideNavBtn =======");
        var x = document.getElementById("mobSideNav").style.display;
        if(document.getElementById("mobSideNav").style.display === 'block'){
            document.getElementById("mobSideNav").style.display = 'none';
        }else if(document.getElementById("mobSideNav").style.display === 'none'){
            document.getElementById("mobSideNav").style.display = 'block';
        }
    }

  </script>

  </body>
</html>
