<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Qurious qr generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

  </head>
  <body>
    <canvas id="qrcode"></canvas>
    <script type="text/javascript">
        var qrcode = new QRious({
            element: document.getElementById("qrcode"),
            background: '#ffffff',
            backgroundAlpha: 1,
            foreground: '#5868bf',
            foregroundAlpha: 1,
            level: 'H',
            padding: 0,
            size: 256,
            value: "https://gini-assistant.herokuapp.com/covid"
        });
    </script>
  </body>
</html>
