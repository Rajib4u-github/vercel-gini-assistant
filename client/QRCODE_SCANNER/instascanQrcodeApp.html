    <style media="screen">
      html {
          height: 100%;
        }

        body {
          font-family: sans-serif;
          padding: 0 10px;
          height: 100%;
          background: black;
          margin: 0;
        }

        h1 {
          color: white;
          margin: 0;
          padding: 15px;
        }

        #container {
          text-align: center;
          margin: 0;
        }

        #qr-canvas {
          margin: auto;
          width: calc(100% - 20px);
          max-width: 400px;
        }

        #btn-scan-qr {
          cursor: pointer;
        }

        #btn-scan-qr img {
          height: 10em;
          padding: 15px;
          margin: 15px;
          background: white;
        }

          font-size: 1.2em;

          max-width: 700px;
          background-color: white;
        }

    </style>
    <style>
      html,
      body {
          height: 100%;
          margin: 0;
      }

      .qr-scanner {
          background-image:
              linear-gradient(0deg,
              transparent 24%,
              rgba(32, 255, 77, 0.1) 25%,
              rgba(32, 255, 77, 0.1) 26%,
              transparent 27%,
              transparent 74%,
              rgba(32, 255, 77, 0.1) 75%,
              rgba(32, 255, 77, 0.1) 76%,
              transparent 77%,
              transparent),
              linear-gradient(90deg,
              transparent 24%,
              rgba(32, 255, 77, 0.1) 25%,
              rgba(32, 255, 77, 0.1) 26%,
              transparent 27%,
              transparent 74%,
              rgba(32, 255, 77, 0.1) 75%,
              rgba(32, 255, 77, 0.1) 76%,
              transparent 77%,
              transparent);
          background-size: 3rem 3rem;
          background-position: -1rem -1rem;
          width: 100%;
          height: 550px;
          position: relative;
          background-color: #111;
      }

      .qr-scanner .box {
          width: 75vw;
          height: 75vw;
          max-height: 75vh;
          max-width: 75vh;
          position: relative;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          overflow: hidden;
          border: 0.1rem solid rgba(0, 255, 51, 0.2);
      }

      .qr-scanner .line {
          height: calc(100% - 2px);
          width: 100%;
          background: linear-gradient(180deg, rgba(0, 255, 51, 0) 43%, #00ff33 211%);
          border-bottom: 3px solid #00ff33;
          transform: translateY(-100%);
          animation: radar-beam 2s infinite;
          animation-timing-function: cubic-bezier(0.53, 0, 0.43, 0.99);
          animation-delay: 1.4s;
      }

      .qr-scanner .box:after,
      .qr-scanner .box:before,
      .qr-scanner .angle:after,
      .qr-scanner .angle:before {
          content: '';
          display: block;
          position: absolute;
          width: 3vw;
          height: 3vw;

          border: 0.2rem solid transparent;
      }

      .qr-scanner .box:after,
      .qr-scanner .box:before {
          top: 0;
          border-top-color: #00ff33;
      }

      .qr-scanner .angle:after,
      .qr-scanner .angle:before {
          bottom: 0;
          border-bottom-color: #00ff33;
      }

      .qr-scanner .box:before,
      .qr-scanner .angle:before {
          left: 0;
          border-left-color: #00ff33;
      }

      .qr-scanner .box:after,
      .qr-scanner .angle:after {
          right: 0;
          border-right-color: #00ff33;
      }

      @keyframes radar-beam {
          0% {
              transform: translateY(-100%);
          }

          100% {
              transform: translateY(0);
          }
      }
      </style>
  </head>

  <body>
    <div id="container">
      <h1>QR Code Scanner</h1>

      <!-- <a id="btn-scan-qr">
        <img src="https://dab1nmslvvntp.cloudfront.net/wp-content/uploads/2017/07/1499401426qr_icon.svg">
      <a/> -->

      <!-- <canvas hidden="" id="qr-canvas"></canvas> -->

      <div class="qr-scanner">
        <canvas hidden="" id="qr-canvas"></canvas>
        <div class="box">
            <div class="line"></div>
            <div class="angle"></div>
        </div>
      </div>

      <div id="qr-result" hidden="">
        <b>Data:</b> <span id="outputData"></span>
      </div>

      <!-- <a id="btn-scan-qr">
        <img src="https://dab1nmslvvntp.cloudfront.net/wp-content/uploads/2017/07/1499401426qr_icon.svg">

      <a/> -->
      <!-- <div>
        <button type="button" name="button" id="btn-scan-qr" style="width: 100%; padding: 10px; background: brown; color: white; position: relative; bottom: 10px; border: none; ">
            Scan QR Code
        </button>
      </div> -->

    </div>
    <script type="text/javascript">
      const qrcode1 = window.qrcode;

      const video = document.createElement("video");
      const canvasElement = document.getElementById("qr-canvas");
      const canvas = canvasElement.getContext("2d");

      const qrResult = document.getElementById("qr-result");
      const outputData = document.getElementById("outputData");
      // const btnScanQR = document.getElementById("btn-scan-qr");

      let scanning = false;

      qrcode1.callback = res => {
      if (res) {
        outputData.innerText = res;
        let data = res;

        scanning = false;

        // video.srcObject.getTracks().forEach(track => {
        //   track.stop();
        // });

        qrResult.hidden = false;
        canvasElement.hidden = true;
        btnScanQR.hidden = false;
        // console.log("qr decode data : ", res);
        if(res.indexOf(".com") !== -1){
          // window.open()
          alert("open new window...");
        }
      }
      };

      function tick() {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        scanning && requestAnimationFrame(tick);
      }

      function scan() {
        try {
          qrcode1.decode();
        } catch (e) {
          setTimeout(scan, 300);
        }
      }

      function scanQRCode(){
          navigator.mediaDevices
            .getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
              scanning = true;
              qrResult.hidden = true;
              // btnScanQR.hidden = true;
              canvasElement.hidden = false;
              video.setAttribute("playsinline", true); // required to tell iOS safari we don't want fullscreen
              video.srcObject = stream;
              video.play();
              tick();
              scan();
            });
      };

      // setInterval(scanQRCode, 100);
      scanQRCode();

    </script>
  </body>
</html>
