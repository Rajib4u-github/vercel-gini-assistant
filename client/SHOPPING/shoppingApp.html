      #header {
        transition: all 0.5s;

      /* .nav-menu a{color: red !important;} */
      .custom-menu a{color: var(--default-theme-color) !important;}
      .custom-nav-menu a{color: white !important;}
      .nav-menu > ul > li > a:before {
          content: "";
          position: absolute;
          width: 100%;
          height: 2px;
          bottom: -5px;
          left: 0;
          background-color: #fff;
          visibility: hidden;
          width: 0px;
          transition: all 0.3s ease-in-out 0s;
      }
      #header.header-scrolled, #header.header-inner-pages {

        padding: 12px 0;
      }

      #header .logo {
        font-size: 32px;

        line-height: 1;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      #header .logo a {
        color: #fff;
      }

      #header .logo img {
        max-height: 40px;
      }
      .side-bar{width: 300px;}
      @media (max-width: 992px) {
        #header {
          padding: 12px 0;
        }
        #header .logo {
          font-size: 28px;
        }
      }

      /*--------------------------------------------------------------
      # Navigation Menu
      --------------------------------------------------------------*/
      /* Desktop Navigation */
      .nav-menu ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      /* .nav-menu > ul {
        display: flex;
      } */

      .nav-menu > ul > li {
        position: relative;
        white-space: nowrap;
        padding: 10px 0 10px 24px;
      }

      .nav-menu a {
        display: block;
        position: relative;
        color: rgba(255, 255, 255, 0.7);
        transition: 0.3s;
        font-size: 15px;
        font-weight: 600;
        padding: 0 3px;
        font-family: "Open Sans", sans-serif;
      }

      .nav-menu > ul > li > a:before {
        content: "";
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: -5px;
        left: 0;
        background-color: #fff;
        visibility: hidden;
        width: 0px;
        transition: all 0.3s ease-in-out 0s;
      }

      .nav-menu a:hover:before, .nav-menu li:hover > a:before, .nav-menu .active > a:before {
        visibility: visible;
        width: 100%;
      }

      .nav-menu a:hover, .nav-menu .active > a, .nav-menu li:hover > a {
        color: #fff;
      }

      .nav-menu .drop-down ul {
        display: block;
        position: absolute;
        left: 22px;
        top: calc(100% + 30px);
        z-index: 99;
        opacity: 0;
        visibility: hidden;
        padding: 10px 0;
        background: #fff;
        box-shadow: 0px 0px 30px rgba(127, 137, 161, 0.25);
        transition: 0.3s;
      }

      .nav-menu .drop-down:hover > ul {
        opacity: 1;
        top: 100%;
        visibility: visible;
      }

      .nav-menu .drop-down li {
        min-width: 180px;
        position: relative;
      }

      .nav-menu .drop-down ul a {
        padding: 10px 20px;
        font-size: 14px;
        text-transform: none;
        color: #2c4964;
      }

      .nav-menu .drop-down ul a:hover, .nav-menu .drop-down ul .active > a, .nav-menu .drop-down ul li:hover > a {
        color: #5846f9;
      }

      .nav-menu .drop-down > a:after {
        content: "\ea99";
        font-family: IcoFont;
        padding-left: 5px;
      }

      .nav-menu .drop-down .drop-down ul {
        top: 0;
        left: calc(100% - 30px);
      }

      .nav-menu .drop-down .drop-down:hover > ul {
        opacity: 1;
        top: 0;
        left: 100%;
      }

      .nav-menu .drop-down .drop-down > a {
        padding-right: 35px;
      }

      .nav-menu .drop-down .drop-down > a:after {
        content: "\eaa0";
        font-family: IcoFont;
        position: absolute;
        right: 15px;
      }

      @media (max-width: 1366px) {
        .nav-menu .drop-down .drop-down ul {
          left: -90%;
        }
        .nav-menu .drop-down .drop-down:hover > ul {
          left: -100%;
        }
        .nav-menu .drop-down .drop-down > a:after {
          content: "\ea9d";
        }
      }

      /* Get Startet Button */
      .get-started-btn {
        margin-left: 25px;
        color: #fff;
        border-radius: 5px;
        padding: 6px 25px 8px 25px;
        white-space: nowrap;
        transition: 0.3s;
        font-size: 14px;
        font-weight: 600;
        display: inline-block;
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      .get-started-btn:hover {
        border-color: #fff;
        color: #fff;
      }

      @media (max-width: 992px) {
        .get-started-btn {
          margin: 0 48px 0 0;
          padding: 6px 18px;
        }
      }

      /* Mobile Navigation */
      .mobile-nav-toggle {
        position: fixed;
        right: 15px;
        top: 15px;
        z-index: 9998;
        border: 0;
        background: none;
        font-size: 24px;
        transition: all 0.4s;
        outline: none !important;
        line-height: 1;
        cursor: pointer;
        text-align: right;
      }

      .mobile-nav-toggle i {
        color: #fff;
      }

      .mobile-nav {
        position: fixed;
        top: 55px;
        right: 15px;
        bottom: 15px;
        left: 15px;
        z-index: 9999;
        overflow-y: auto;
        background: #fff;
        transition: ease-in-out 0.2s;
        opacity: 0;
        visibility: hidden;
        border-radius: 10px;
        padding: 10px 0;
      }

      .mobile-nav * {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .mobile-nav a {
        display: block;
        position: relative;
        color: #2c4964;
        padding: 10px 20px;
        font-weight: 500;
        outline: none;
      }

      .mobile-nav a:hover, .mobile-nav .active > a, .mobile-nav li:hover > a {
        color: #5846f9;
        text-decoration: none;
      }

      .mobile-nav .drop-down > a:after {
        content: "\ea99";
        font-family: IcoFont;
        padding-left: 10px;
        position: absolute;
        right: 15px;
      }

      .mobile-nav .active.drop-down > a:after {
        content: "\eaa1";
      }

      .mobile-nav .drop-down > a {
        padding-right: 35px;
      }

      .mobile-nav .drop-down ul {
        display: none;
        overflow: hidden;
      }

      .mobile-nav .drop-down li {
        padding-left: 20px;
      }

      .mobile-nav-overly {
        width: 100%;
        height: 100%;
        z-index: 9997;
        top: 0;
        left: 0;
        position: fixed;
        background: rgba(28, 47, 65, 0.6);
        overflow: hidden;
        display: none;
        transition: ease-in-out 0.2s;
      }

      .mobile-nav-active {
        overflow: hidden;
      }

      .mobile-nav-active .mobile-nav {
        opacity: 1;
        visibility: visible;
      }

      .mobile-nav-active .mobile-nav-toggle i {
        color: #fff;
      }

      /* MOBILE SIDE NAV STYLE SET */

        padding: 0 15px;

        overflow-y: auto;
      }

    }

    function setup_default_theme(defaultStyle){
        console.log("============ calling default style function =============");
        console.log("@@@ defaultStyle : ", defaultStyle);
        let root = document.documentElement;
        root.style.setProperty('--default-theme-color', defaultStyle.themeColor);
        root.style.setProperty('--default-theme-bg-color', defaultStyle.themeBgColor);
        root.style.setProperty('--default-theme-card-bg-color', defaultStyle.themeCardBgColor);
        root.style.setProperty('--default-theme-font-color', defaultStyle.themeFontColor);
        root.style.setProperty('--default-theme-menu-bg-color', defaultStyle.themeMenuBgColor);

      function onMouseInOutShefs(that, event, eventType){
            console.log("======== onHoverShefs =========");
            let id = that.id;
            let imgId = that.id;
            id = id.replace("input","item");
            let nextSibling = document.getElementById(id).nextSibling.nextElementSibling.id;
            let element = document.getElementById(nextSibling);
            if(eventType === 'onMouseIn_shefs'){
                element.style.display = "block";
                document.getElementById(imgId).style.filter = "grayscale(100%)";
                document.getElementById(imgId).style.filter = "blur(3px)";
                element.classList.add("custom-animation");
            }else if(eventType === "onMouseOut_shefs"){
                element.style.display = "none";
                document.getElementById(imgId).style.filter = "none";
            }
      }
