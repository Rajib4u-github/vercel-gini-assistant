  <style >
      :root {
        --default-theme-color: #0F71A1;

      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      section {
          padding: 30px 0;
          overflow: hidden;
      }
      a{color: black;}
      input[type=text] {border: none; padding: 5px 20px; margin-bottom: 5px; background: rgb(241, 243, 246); outline-color: #0F71A1 !important; }
      textarea {border: none; padding: 5px 20px; margin-bottom: 5px; background: rgb(241, 243, 246);  width: 100%; outline-color: #0F71A1 !important;}
      div.scrollmenu { overflow: auto; white-space: nowrap; transition: 0.3s;}
      div.scrollmenu a {  display: inline-block; text-decoration: none; vertical-align: top; color: grey;}
      .category-item{background: #E8EAED; padding: 6px 16px; margin-right: 8px; border-radius: 16px; color: black;}
      .work-item{width: 24%; float: left; display: inline-block; margin-right: 1%; margin-bottom: 16px;}
      .workcat-items-block{display: inline-block; width: 93%;}
      .work-item{width: 24%; float: left; display: inline-block; margin-right: 1%; margin-bottom: 16px;}
      .work-cat-left-arrow-block{width: 4%; display: inline-block; position: relative; top: -18px;}
      .work-cat-right-arrow-block{width: 5%; display: inline-block; position: relative; top: -18px; text-align: center;}
      .single-line-ellipse{white-space: nowrap; width: 80%; overflow: hidden; text-overflow: ellipsis;}
      #jsonViewer {
        width: 100%;
        min-height: 30rem;
        font-family: "Lucida Console", Monaco, monospace;
        font-size: 0.8rem;
        line-height: 1.2;
      }

      /* modal related stylesheet */
      .modal-dialog{ position: relative; max-width: 50% !important; margin-left: 35%;margin-top: 10%;}

    @media (min-width: 320px) and (max-width: 480px) {
      .custom-progress-block, .custom-education-section-degree, .custom-each-education-section, .custom-each-work-exp-section, .testimonial-item, .mob-width-full, .custom-additional-skill-each-section, .custom-each-fact-section, .each-project-section, .custom-project-header-desc-section, .custom-section {width: 100% !important;}
      .skills .progress{width: 100% !important}
      .custom-work-img{height: auto; width: 100%;}
      .work-cat-arrow-block{display: none; width: 3%;}
      .portfolio-item{width: 100%;}
      .each-project-section{margin-right: 0px;}
      .work-cat-left-arrow-block, .work-cat-right-arrow-block{display: none;}

  <script>
    var socket = io();
    let currentSelectedWorkCategory = "Education";
    let localStorage = {};
    function inittial_setup(sections, edit){
        console.log("################## calling cli ent side init function ===============");
        console.log("################## sections :: ", sections);
        let sections1 = ["header", "typed", "about", "facts", "services", "skills", "education", "workexp", "workcat", "work", "languages", "contacts"];
        let dynamicHeaderMenus = [];
        let sectionsTemplate = '';
        sections.values.forEach((item, index) => {
            dynamicHeaderMenus.push(item.section.name);
        });
        sections.values.forEach((item, index) => {
            let loaderTemplate = '';

            let request_section_data = {apiRef : item.section.name+'_section', blockId: 'custom_'+item.section.name+'_block', templateId: 'custom_'+item.section.name+'_template', loaderId: 'custom_'+item.section.name+'_loader', edit: edit};
            if(item.loader.img !== undefined && item.loader.img !== null){
                loaderTemplate += `<img class="loader-img" src="`+item.loader.img.imgUrl+`"  alt="`+item.loader.alt+`" style="`+item.loader.img.style+`">`;
            }
            if(item.section.name === 'work'){
                  request_section_data.logoCategory = "Education";
            }
            if(item.section.name === 'typed' || item.section.name === 'settings'){
                request_section_data = {apiRef : item.section.name+'_section', blockId: null, templateId: null, loaderId: null}
                socket.emit("request-generic-portfolio", request_section_data);

            }else if(item.section.name !== 'header'){
              sectionsTemplate += `
                  <section id="`+item.section.name+`" class="`+item.section.name+`" style="`+item.section.style+`">
                      <div class="custom-`+item.section.name+`-block " id="custom_`+item.section.name+`_block" style="`+item.block.style+`">
                          <div class="loader-block" id="custom_`+item.section.name+`_loader" style="display: block; `+item.loader.style+`">
                                `+loaderTemplate+`
                          </div>
                          <div class="custom-`+item.section.name+`-template `+item.template.class+`" id="custom_`+item.section.name+`_template" style="display: none; `+item.template.style+`"></div>
                      </div>
                  </section>
              `;
              socket.emit("request-generic-portfolio", request_section_data);

            }else if(item.section.name === 'header'){
              sectionsTemplate += `
                      <div class="custom-`+item.section.name+`-block " id="custom_`+item.section.name+`_block" style="`+item.block.style+`">
                          <div class="loader-block" id="custom_`+item.section.name+`_loader" style="display: block; `+item.loader.style+`">
                              `+loaderTemplate+`
                          </div>
                          <div class="custom-`+item.section.name+`-template `+item.template.class+`" id="custom_`+item.section.name+`_template" style="display: none; `+item.template.style+`"></div>
                      </div>
              `;
              request_section_data.dynamic_header_menus = dynamicHeaderMenus;
              // console.log("&&&&&&&&&&& dynamic_header_menus :: ", dynamicHeaderMenus);
              socket.emit("request-generic-portfolio", request_section_data);

            }

        })
        {
          document.getElementById("sections_block").innerHTML = '';
          document.getElementById("sections_block").innerHTML = sectionsTemplate;
          if(sections.sectionStyle && sections.sectionStyle !== ''){
            document.getElementById("sections_block").style = sections.sectionStyle;
          }
        }

    };


    socket.emit("request-initial-sections-data", {});

    socket.on("response-initial-sections-data", (data) => {
        console.log("************* calling socket response-initial-sections-data ************");
        let allSectionsData = data.allSectionsData;
        console.log("@@@@ all initial sections data :: ", data);
        localStorage.allSectionData = allSectionsData;
        localStorage.activeSectionsData = allSectionsData;
        inittial_setup(allSectionsData, false);

    });

    function updateSettingsBlock(){
        console.log("===== calling update settings block =====");
        socket.emit("request-generic-portfolio", {apiRef : 'settings_section', blockId: 'custom_settings_block', templateId: 'custom_settings_template', loaderId: 'custom_settings_loader'});
    }

    function createTypedSection(data){
        // console.log("@@@ data :: ", data);
        // console.log("url: ", data.data.img.url);
        let typedTxt = data.data.typedText;
        let typedOptions = data.data.typedOptions;
        let template = `
            <section id="hero" class="d-flex flex-column justify-content-center align-items-center">
                <h1 style="`+data.data.profile.style+`">`+data.data.profile.name+`</h1>
                <div class="element" style="font-size: 44px; color: white; font-weight: 700;"></div>
            </section>
        `;
        //document.getElementById("custom_typed_loader").style.display = "none";
        document.getElementById("typedBlock").innerHTML = template;
        // document.getElementById("hero").style.backgroundImage = "url('static/img/me_portfolio/portfolio1.jpg')";
        if(data.data.img && data.data.img.url !== ''){
            let url = "url("+data.data.img.url+")";
            document.getElementById("hero").style.backgroundImage = url;
        }
        var typed = new Typed('.element', typedOptions);
    }

    socket.on("response-generic-portfolio", (data) => {
        console.log("!!! data.apiref :: ", data.apiRef);
        if(data.apiRef === 'settings_section'){
          // console.log("$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$");
          // console.log("!!!!@@@@ data : ", data );
          document.getElementById("setupSectionsBlock").innerHTML = data.template;
          return;
        }
        if(data.apiRef === 'about_section'){
            // console.log("!!!! data : ", data );
        }
        if(data.apiRef === "typed_section"){
            createTypedSection(data);
            return;
        }
        if(data.apiRef === "update_initial_sections"){
          updateSettingsBlock();
          return;
        }
        if(data.blockId !== null && data.blockId !== undefined){

        }
        if(data.loaderId !== null && data.loaderId !== undefined && data.loaderId !== ''){
            document.getElementById(data.loaderId).style.display = "none";
        }
        if(data.templateId !== null && data.templateId !== undefined && data.templateId !== ''){
          document.getElementById(data.templateId).style.display = "block";
          document.getElementById(data.templateId).innerHTML = '';
          document.getElementById(data.templateId).innerHTML = data.template;
        }

    })

    window.onClickworkCategoryArrowIcon = function(event, arrow){

      if(arrow === "left_arrow"){
          if(workCategoryStartIndex !== 0){
              workCategoryStartIndex -= 1;
              createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
              document.getElementById("workCategory_left_arrow").style.display = "block";
              document.getElementById("workCategory_right_arrow").style.display = "block";
          }else if(workCategoryStartIndex === 0){
            document.getElementById("workCategory_left_arrow").style.display = "none";
          }else{
              document.getElementById("workCategory_left_arrow").style.display = "none";
          }
      }else if(arrow === "right_arrow"){
          if(workCategoryStartIndex <= 3){
              workCategoryStartIndex += 1;
              createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
              document.getElementById("workCategory_left_arrow").style.display = "block";
          }else{
            document.getElementById("workCategory_right_arrow").style.display = "none";
          }
      }
}

function onClickItem(that , event, eventState){
    // console.log("******** on click function on click item ********");
    // console.log("@@@@ EVENT :: ", event);
    // console.log("@@@ that ::  ", that);
    // console.log("@@@ eventState ::  ", eventState);
    let updatedSetupArr = [];
    // let id = that.id;
    let x = document.getElementById("setupSectionsBlock").querySelectorAll(".custom-section");
    // console.log("@@@@ x :: ", x);
    // console.log("@@@ x length : ", x.length);
    // console.log("@@@@ x[0] : ", x[1]);
    // console.log("@@@ x[0] data set :: ", (x[1].dataset.all));
    x.forEach((item, index) => {
        if(item.dataset.all !== undefined){
            let dataset = item.dataset.all;
            // console.log("@@@ dataset : ", JSON.parse(dataset).selected);
            let tempObj = {};
            tempObj.id = item.id;
            tempObj.selected = JSON.parse(dataset).selected;
            tempObj.sectionName = JSON.parse(dataset).sectionName;
            updatedSetupArr.push(tempObj);
        }
    });
    console.log("!!!!!!!!! final settings setups dataset ", updatedSetupArr);
    console.log("!!!! localStorage : ", localStorage.allSectionData);
    let allSectionsData = localStorage.allSectionData;
    let filteredInitialSections = [];
    let isSelectedTypedSection = null;
    let activeSections = [];
    // let defaultTypedObj = null;
    localStorage.allSectionData.values.forEach((item, index) => {
        if(item.section.name === 'header' || item.section.name === "settings" ){
            filteredInitialSections.push(item);
        }
        updatedSetupArr.forEach((ele, index) => {
            if(ele.sectionName === 'typed'){
                if(ele.selected === true){
                    document.getElementById("typedBlock").style.display = "block";
                    isSelectedTypedSection = true;
                    activeSections.push("typed");
                    // defaultTypedObj = item;
                    // filteredInitialSections.push(item);
                }else{
                    document.getElementById("typedBlock").style.display = "none";
                    isSelectedTypedSection = false;
                }
            }else if((ele.sectionName === item.section.name) && (ele.selected === true)){
                console.log("!!!! true section name ", item.section.name);
                activeSections.push(item.section.name);
                filteredInitialSections.push(item);
            }
        })
    })
    if(isSelectedTypedSection){
        // filteredInitialSections.splice(1, 0, defaultTypedObj);
        // sections.push(defaultTypedObj);
        let typedObj = {
          section: {name: 'typed', id: '', class: '', style: ''},
          block: {class: '', style: ''},
          loader: {img: {imgUrl: '', alt: '', style: ''},  style: ''},
          template: {style: ''}
        };
        // filteredInitialSections.push(typedObj);
        filteredInitialSections.splice(1, 0, typedObj);
    }
    let sections = {values: filteredInitialSections, sectionStyle: 'background: #F1F3F6;'};
    // localStorage.activeSectionsData = sections;
    console.log("!!!! sections :: ", sections);
    localStorage.activeSectionsData = sections;
    inittial_setup(sections, false);
    let payload = {
        apiRef : 'update_initial_sections',
        actionType : 'update_initial_sections_setup',
        sectionName: 'settings_section',
        updatedSections: updatedSetupArr
    }
    // document.getElementById("setupSectionsModal").style.display = 'none';
    $('#setupSectionsModal').modal('hide');
    socket.emit("request-generic-portfolio", payload);
}

function isEmpty(obj) {
    for(var key in obj) {
        if(obj.hasOwnProperty(key))

    return true;
}

function convertStringToCSSTemplate(item){
  let template = '';
  if(item){
      if(item.key.name !== ''){
          console.log("@@@ key style :: ", item.key.style);
          let strArr = item.key.style.split(";");
          console.log("@@@ strArr : ", strArr);
          let height = 'auto';
          let css = '';
          css += '{ ';
          // strArr.forEach((item, index) => {
          //     css += item+'; ';
          // });
          css += item.key.style;
          css += '}'
          height = ((strArr.length) * 20 )+'px;';
          template += `
            <div>
              <div class="single-line-ellipse">`+item.key.name+`</div>
              <div>
                <textarea id="itemStyle" name="name" style="width: 100%; height: `+height+`">
                `+css+`
                </textarea>
              </div>
            </div>
          `

      }

      if(item.secStyle !== ''){
        let strArr = item.secStyle.split(";");
        let css = '';
        css += '{ ';
        // strArr.forEach((item, index) => {
        //     css += item+'; \n';
        // });
        css += item.secStyle;
        css += '}'
        let height = ((strArr.length) * 20 )+'px;';
        template += `
          <div>
            <div class="">Section Style</div>
            <div>
              <textarea id="sectionStyle" name="name" style="width: 100%; height: `+height+`">
              `+css+`
              </textarea>
            </div>
          </div>
        `
      }
      let onClickPreviewMethod = 'onclick="onClickSaveStyles(\''+currentOnClickThreeDotsState.sectionName+'\', \''+currentOnClickThreeDotsState.sectionIndex+'\', \''+currentOnClickThreeDotsState.partsIndex+'\', \''+currentOnClickThreeDotsState.itemIndex+'\', \''+'preview'+'\')"';
      let onClickSaveMethod = 'onclick="onClickSaveStyles(\''+currentOnClickThreeDotsState.sectionName+'\', \''+currentOnClickThreeDotsState.sectionIndex+'\', \''+currentOnClickThreeDotsState.partsIndex+'\', \''+currentOnClickThreeDotsState.itemIndex+'\', \''+'save'+'\')"';

      template += `
        <div>
          <button type="button"  name="" `+onClickPreviewMethod+`  style="border: none; padding: 10px 20px; width: 48%; display: inline-block; text-align: center;">Preview</button>
          <button type="button"  name=""  `+onClickSaveMethod+` style="border: none; padding: 10px 20px; width: 48%; display: inline-block; text-align: center;">Save</button>
        </div>
      `;

  }
  return template;
}

function convertCSStoStringTemplate(css){
    if(css.indexOf("{") !== -1 && css.indexOf("}") !== -1){
        css = css.replace("{"," ");
        css = css.replace("}"," ");
    }
    return css;
}

      // document.getElementById("editStylePopup").style.display = 'none';
  }
  document.getElementById(threeDotsId).style.color = "black";
  document.getElementById(itemId).style.border = "none";

}
