  <script>
    var socket = io();
    let currentSelectedWorkCategory = "Education";
    (function init(){
        console.log("============== calling cli ent side init function ===============");
        // document.getElementById("typedItems").innerHTML = 'Im <span class="typed" data-typed-items="Graphic Designer"></span>';
        // document.getElementById("typedProfileName").innerHTML = "Rajib karmakar";
        socket.emit("request-generic-portfolio", {apiRef : 'header_section', blockId: 'custom_header_block', templateId: 'custom_header_template', loaderId: 'custom_header_loader'});

        // socket.emit("request-generic-portfolio", {apiRef : 'typed_section', blockId: 'custom_typed_block', templateId: 'custom_typed_template', loaderId: 'custom_typed_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'work_cat_list_section', blockId: 'custom_work_cat_block', templateId: 'custom_work_cat_template', loaderId: 'custom_work_cat_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'work_by_category', blockId: 'custom_new_latest_work_block', templateId: 'custom_new_latest_work_template', loaderId: 'custom_new_latest_work_loader', logoCategory : "Education"});

        socket.emit("request-generic-portfolio", {apiRef : 'about_section', blockId: 'custom_about_block', templateId: 'custom_about_template', loaderId: 'custom_about_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'facts_section', blockId: 'custom_facts_block', templateId: 'custom_facts_template', loaderId: 'custom_facts_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'skills_section', blockId: 'custom_skills_block', templateId: 'custom_skills_template', loaderId: 'custom_skills_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'education_section', blockId: 'custom_education_block', templateId: 'custom_education_template', loaderId: 'custom_education_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'work_exp_section', blockId: 'custom_work_exp_block', templateId: 'custom_work_exp_template', loaderId: 'custom_work_exp_loader'});

        // socket.emit("request-generic-portfolio", {apiRef : 'latest_work_section', blockId: 'custom_latest_work_block', templateId: 'custom_latest_work_template', loaderId: 'custom_latest_work_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'services_section', blockId: 'custom_services_block', templateId: 'custom_services_template', loaderId: 'custom_services_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'testimonials_section', blockId: 'custom_testimonials_block', templateId: 'custom_testimonials_template', loaderId: 'custom_testimonials_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'languages_section', blockId: 'custom_languages_block', templateId: 'custom_languages_template', loaderId: 'custom_languages_loader'});

        socket.emit("request-generic-portfolio", {apiRef : 'contacts_section', blockId: 'custom_contacts_block', templateId: 'custom_contacts_template', loaderId: 'custom_contacts_loader'});

    })();


    socket.on("response-generic-portfolio", (data) => {
        if(data.blockId !== null && data.blockId !== undefined){

        }
        if(data.loaderId !== null && data.loaderId !== undefined && data.loaderId !== ''){
            document.getElementById(data.loaderId).style.display = "none";
        }
        if(data.templateId !== null && data.templateId !== undefined && data.templateId !== ''){
          document.getElementById(data.templateId).style.display = "block";
          document.getElementById(data.templateId).innerHTML = '';
          document.getElementById(data.templateId).innerHTML = data.template;
        }
    })

    window.onClickworkCategoryArrowIcon = function(event, arrow){
    if(arrow === "left_arrow"){
        if(workCategoryStartIndex !== 0){
            workCategoryStartIndex -= 1;
            createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
            document.getElementById("workCategory_left_arrow").style.display = "block";
            document.getElementById("workCategory_right_arrow").style.display = "block";
        }else if(workCategoryStartIndex === 0){
          document.getElementById("workCategory_left_arrow").style.display = "none";
        }else{
            document.getElementById("workCategory_left_arrow").style.display = "none";
        }
    }else if(arrow === "right_arrow"){
        if(workCategoryStartIndex <= 3){
            workCategoryStartIndex += 1;
            createWordByCategoryList(workCategoryStartIndex, currentSelectedWorkCategory);
            document.getElementById("workCategory_left_arrow").style.display = "block";
        }else{
          document.getElementById("workCategory_right_arrow").style.display = "none";
        }
    }
}

window.onClickWorkCatItem = function(event){
    document.getElementById(currentSelectedWorkCategory).style.background = "#E8EAED";
    document.getElementById(currentSelectedWorkCategory).style.color = "black";
    let id = event.target.id;
    currentSelectedWorkCategory = id;
    document.getElementById(currentSelectedWorkCategory).style.background = "orange";
    document.getElementById(currentSelectedWorkCategory).style.color = "white";
    socket.emit("request-generic-portfolio", {apiRef : 'work_by_category', blockId: 'custom_new_latest_work_block', templateId: 'custom_new_latest_work_template', loaderId: 'custom_new_latest_work_loader', logoCategory : id});


}
