        }

        currentOnClickThreeDotsState.sectionIndex = sectionIndex;
        currentOnClickThreeDotsState.partsIndex = partsIndex;
        currentOnClickThreeDotsState.itemIndex = itemIndex;

        document.getElementById(threeDotsId).style.color = "var(--default-theme-color)";
        document.getElementById(itemId).style.border = "2px solid var(--default-theme-color)";

        let left = event.pageX - (300 + 6);
        let top = event.pageY + 'px';
        currentOnClickThreeDotsState.popupPosition = {left: left, top: top};
        left = left + 'px';
        currentOnClickThreeDotsState.popupPosition = {left: left, top: top};

        document.getElementById("popup").style.display = "block";
        document.getElementById("popup").style.position = "absolute";
        document.getElementById("popup").style.left = left;
        document.getElementById("popup").style.top = top;
        document.getElementById("popup").style.zIndex = "99";
    }
